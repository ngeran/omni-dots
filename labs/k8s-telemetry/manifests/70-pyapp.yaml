# Python web service — built locally and loaded into k3s (no registry).
# Build/import (see ../python-app/):
#   cd ../python-app
#   docker build -t pyapp:dev .
#   docker save pyapp:dev -o /tmp/pyapp.tar
#   sudo k3s ctr -n k8s.io images import /tmp/pyapp.tar
# imagePullPolicy: Never — k3s must never try to pull pyapp:dev from a registry.
# Ingress for pyapp.lab.local lives in 90-ingress.yaml.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyapp
  namespace: lab
  labels:
    app: pyapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pyapp
  template:
    metadata:
      labels:
        app: pyapp
    spec:
      containers:
        - name: pyapp
          image: pyapp:dev
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: pyapp
  namespace: lab
spec:
  selector:
    app: pyapp
  ports:
    - name: http
      port: 8080
      targetPort: 8080
