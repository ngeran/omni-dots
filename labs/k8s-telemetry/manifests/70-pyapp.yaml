# Python web service — Nix-built image pulled from the local registry.
# Build/push/deploy (see ../python-app/flake.nix + justfile):
#   cd ../python-app
#   just build     # nix build .#image  →  ./result (image tarball)
#   just push      # skopeo → localhost:5000/pyapp:latest  (no docker)
#   just deploy    # applies this manifest + rolls the Deployment
# imagePullPolicy: Always — the tag is fixed (:latest) and re-pushed, so Always
# forces k3s to fetch the newest digest each rollout (IfNotPresent would serve
# a stale cache). k3s pulls over plain HTTP via the registries.yaml mirror in
# labs/k8s-registry.nix. Ingress for pyapp.lab.local lives in 90-ingress.yaml.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyapp
  namespace: lab
  labels:
    app: pyapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pyapp
  template:
    metadata:
      labels:
        app: pyapp
    spec:
      containers:
        - name: pyapp
          image: localhost:5000/pyapp:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: pyapp
  namespace: lab
spec:
  selector:
    app: pyapp
  ports:
    - name: http
      port: 8080
      targetPort: 8080
