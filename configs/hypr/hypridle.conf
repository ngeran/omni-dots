# =============================================================================
# HYPRIDLE CONFIGURATION
# Optimized for OLED longevity and reliability
# =============================================================================

general {
    # Command to run when we want to lock the screen
    # Use pidof to prevent multiple instances of hyprlock
    lock_cmd = pidof hyprlock || hyprlock       
    
    # Run before the system goes to sleep (suspend/hibernate)
    before_sleep_cmd = loginctl lock-session    
    
    # Ensure display is ON when we wake the computer up
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })'  
    
    # Set to 'true' to ensure the screen turns off even if media is playing
    # This fixes issues where browsers/apps prevent the monitor from shutting down
    ignore_dbus_inhibit = true
}

# ── Stage 1: Dimming (The Warning) ───────────────────────────────────────────
# Lowers brightness before locking. Good for OLED to reduce heat/power.
listener {
    timeout = 180                                # 3 minutes
    on-timeout = brightnessctl -s set 10%        # Save current brightness and dim to 10%
    on-resume = brightnessctl -r                 # Restore saved brightness on activity
}

# ── Stage 2: Lock Session ───────────────────────────────────────────────────
# Secures the session.
listener {
    timeout = 300                                # 5 minutes
    on-timeout = loginctl lock-session           # Calls the lock_cmd defined above
}

# ── Stage 3: Display Off ────────────────────────────────────────────────────
# Turns off the signal (DPMS) shortly after locking.
# Separating this from Stage 2 ensures hyprlock is ready before power-off.
listener {
    timeout = 330                                # 5.5 minutes
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({ action = "disable" })'       # Turn off the display signal
    on-resume = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })' && sleep 1 && quickshell ipc -c bar call barToggle toggle         # Ensure display turns back on
}

