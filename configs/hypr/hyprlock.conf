# =============================================================================
# MINIMAL HYPRLOCK CONFIGURATION (OLED SAFE)
# =============================================================================

general {
    ignore_empty_input = true
    disable_loading_bar = true
}

background {
    # Empty space after '=' is required to target all monitors correctly
    monitor = 
    color = rgb(0, 0, 0)       # Pure black background
    # No path or blur passes to ensure instant load and zero burn-in risk
}

animations {
    enabled = false             # Disabled for maximum speed and simplicity
}

input-field {
    # Empty space after '=' is required to target all monitors correctly
    monitor = 
    size = 400, 50
    position = 0, 0
    halign = center
    valign = center

    # Colors fallback to solid hex values instead of external theme variables
    inner_color = rgb(15, 15, 15)
    outer_color = rgb(45, 45, 45)
    outline_thickness = 2
    font_color = rgb(235, 235, 235)

    # Note: Ensure 'ttf-jetbrains-mono-nerd' or similar is installed
    font_family = JetBrainsMono Nerd Font
    placeholder_text = Enter Password
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = 0                # Square edges
    shadow_passes = 0           # No performance-intensive dropshadows
    fade_on_empty = false
}

auth {
    fingerprint {
        enabled = false
    }
}
