# =============================================================================
# MINIMAL HYPRLOCK CONFIGURATION (OLED SAFE)
# =============================================================================

general {
    ignore_empty_input = true
    disable_loading_bar = true
}

background {
    # Empty space after '=' is required to target all monitors correctly
    monitor = 
    color = rgb(0, 0, 0)       # Pure black background
    # No path or blur passes to ensure instant load and zero burn-in risk
}

animations {
    enabled = false             # Disabled for maximum speed and simplicity
}

input-field {
    # Empty space after '=' is required to target all monitors correctly
    monitor = 
    size = 400, 50
    position = 0, 0
    halign = center
    valign = center

    # Colors fallback to solid hex values instead of external theme variables
    inner_color = rgb(15, 15, 15)
    outer_color = rgb(45, 45, 45)
    outline_thickness = 2
    font_color = rgb(235, 235, 235)

    # Note: Ensure 'ttf-jetbrains-mono-nerd' or similar is installed
    font_family = JetBrainsMono Nerd Font
    placeholder_text = Enter Password
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = 16               # Rounded rectangle (was 0 = square)
    shadow_passes = 0           # No performance-intensive dropshadows
    fade_on_empty = false
}

auth {
    fingerprint {
        enabled = false
    }
}

# =============================================================================
# THEME — sourced LAST so Quickshell's live theme colors can override the
# hardcoded rgb() fallbacks above. Written by ThemeService.syncToExternalApps()
# on every theme change to ~/.config/hypr/quickshell-colors.conf.
#
# IMPORTANT — only `background` is live-themed this way. `input-field` is NOT,
# and must NEVER be redefined in the sourced file. hyprlang does NOT merge
# input-field blocks: each `input-field {}` (here or in a sourced file) is a
# SEPARATE field rendered on screen. A second block therefore draws a second
# overlapping password box — which is what produced the duplicate (square +
# rounded) fields before. The single input-field lives HERE with static colors.
# =============================================================================
source = ~/.config/hypr/quickshell-colors.conf
