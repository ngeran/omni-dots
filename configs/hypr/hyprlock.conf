# =============================================================================
# MINIMAL HYPRLOCK CONFIGURATION (OLED SAFE)
# =============================================================================

general {
    ignore_empty_input = true
    disable_loading_bar = true
}

background {
    # Empty space after '=' is required to target all monitors correctly
    monitor = 
    color = rgb(0, 0, 0)       # Pure black background
    # No path or blur passes to ensure instant load and zero burn-in risk
}

animations {
    enabled = false             # Disabled for maximum speed and simplicity
}

auth {
    fingerprint {
        enabled = false
    }
}

# =============================================================================
# THEME — the sourced file below is the SINGLE source for BOTH the background
# color AND the input-field, written by Quickshell's ThemeService from the
# active palette (~/.cache/theme/colors.json) on login and on every theme
# change. The lock screen therefore adapts to the active theme.
#
# This file deliberately defines NO input-field. hyprlang does NOT merge
# input-field blocks — each `input-field {}` (here OR in a sourced file) is a
# SEPARATE field on screen — so defining one here too would draw a second,
# overlapping password box. Keep the field only in the sourced file.
#
# Robustness: the sourced file is seeded at build time (seedHyprlockColors in
# modules/apps/essentials.nix) and rewritten at login by the settings process,
# so it always exists when hyprlock launches — never leave it unmanaged.
# =============================================================================
source = ~/.config/hypr/quickshell-colors.conf
