# Hugo static-site Deployment (nginx serving the built assets).
# nginx listens on :8080 (non-root can't bind <1024); the Service fronts it on :80.
#
# Safe-by-default: non-root (UID 1000, matches flake.nix config.User), read-only
# root fs (emptyDirs at /tmp + the nginx cache/log dirs so writes succeed), all
# capabilities dropped, no privilege escalation, seccomp=RuntimeDefault, resource
# limits, and / (200) liveness/readiness probes.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hugo-site
  namespace: default
  labels:
    app: hugo-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hugo-site
  template:
    metadata:
      labels:
        app: hugo-site
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: hugo-site
          image: localhost:5000/hugo-site:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 2
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-log
              mountPath: /var/log/nginx
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-log
          emptyDir: {}
