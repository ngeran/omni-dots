# Hugo static-site Deployment (nginx serving the built assets on :80).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hugo-site
  namespace: default
  labels:
    app: hugo-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hugo-site
  template:
    metadata:
      labels:
        app: hugo-site
    spec:
      containers:
        - name: hugo-site
          image: localhost:5000/hugo-site:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
