# Plain-script Job (variant = "script").
# Runs the container's entrypoint (python /app/script.py) to completion.
# Jobs are immutable — `just deploy` deletes + re-applies it to re-run after
# edits (a plain `kubectl apply` won't re-run an existing Job).
#
# Safe-by-default: non-root (UID 1000, matches flake.nix config.User), read-only
# root fs (emptyDir /tmp), all capabilities dropped, seccomp=RuntimeDefault.
# (No liveness/readiness probes — Jobs run to completion, not serving traffic.)
---
apiVersion: batch/v1
kind: Job
metadata:
  name: pyapp
  namespace: default
spec:
  ttlSecondsAfterFinished: 3600   # auto-clean the Job ~1h after it completes
  backoffLimit: 2                  # retry twice on failure
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pyapp
          image: localhost:5000/pyapp:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
